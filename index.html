<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Public Viewer</title>
  </head>
  <body>

        <!-- Filters modal -->
        <div class="modal fade" id="layerFiltersModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-scrollable">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Filters</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <ul class="nav nav-tabs" id="layerFiltersTabs" role="tablist"></ul>
                        <div class="tab-content pt-3" id="layerFiltersTabContent"></div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                            Close
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <div id="appScreens">

            <!-- GIS SCREEN -->
            <section id="gisScreen" class="app-screen active">
                     <div class=" m-0 p-0">
                        <!-- Map -->
                        <div id="map" data-config="" style="width:100%; height: calc(100vh - 0px);">
                        </div>

                        <!-- Viewer Logo -->
                        <div class="viewer-logo">
                            <img src="./public/images/logo/gibraltar_geoportal_BL.png" alt="Viewer logo">
                        </div>

                        <!-- Left layers toolbar -->
                        <div id="gis-toolbar" class="gis-toolbar d-flex flex-column align-items-center">

                            <button class="toolbar-button bottom-menu-button" data-target="base-map-menu" title="Base map">
                                <i class="fas fa-globe"></i>
                                <span class="menu-label">Base</span>
                            </button>

                            <div class="button-separator-vertical"></div>

                            <button class="toolbar-button bottom-menu-button" data-target="wms-menu" title="WMS Layers">
                                <i class="fas fa-layer-group"></i>
                                <span class="menu-label">Layers</span>
                            </button>

                        </div>

                        <!-- Base map menu -->
                        <div id="base-map-menu" class="gis-toolbar-flyout">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <h6>Base map</h6>
                                <div class="wms-menu-close">
                                    <i class="fa-solid fa-xmark closeLeftMenu" data-target="base-map-menu" title="Close" role="button"></i>
                                </div>
                            </div>
                            

                            <!-- Base layers thumbnails will be injected by JS -->
                            <div class="row g-2" id="baseMapMenuContent"></div>
                        </div>

                        <!-- WMS layers menu -->
                        <div id="wms-menu" class="gis-toolbar-flyout">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <h6>Layers</h6>
                                <div class="wms-menu-close">
                                    <i class="fa-solid fa-xmark closeLeftMenu" data-target="wms-menu" title="Close" role="button"></i>
                                </div>
                            </div>
                            
                            <input
                                type="text"
                                id="layersSearchInput"
                                class="form-control form-control-sm mb-2"
                                placeholder="Search layers"
                                autocomplete="off"
                            />

                        <div class="layers-list-wrapper">
                                <ul id="layersMenuSelector" class="list-unstyled mb-0"></ul>
                            </div>
                        </div>

                        <!-- Street view container-->
                        <div id="streetViewPanel" class="street-view-panel">
                            <div class="street-view-header">
                                <strong>Street View</strong>
                                <button id="closeStreetView">×</button>
                            </div>

                            <div id="streetViewStatus" class="street-view-status"></div>
                            <div id="streetViewContainer"></div>
                        </div>

                        <!-- Elevation profile -->
                        <div id="profileWindow" style="display:none;">
                            <div class="profile-header">
                                <span>Elevation Profile (terrain)</span>
                                <button id="closeProfile">&times;</button>
                            </div>
                            <canvas id="profile"></canvas>
                        </div>

                        <!-- Mouse coordinates -->
                        <div id="mouse-coordinates" class="map-coordinates"></div>

                        <!-- Search box -->
                        <div class="search-box">
                            <div class="search-wrapper">
                                <span class="search-icon"><i class="fas fa-search"></i></span>
                                <input
                                    type="text"
                                    id="searchInput"
                                    class="form-control search-input"
                                    placeholder="Search">
                                <span class="search-clear d-none" id="clearSearch">
                                    <i class="fas fa-times"></i>
                                </span>
                            </div>
                            <ul id="autocompleteResults" class="list-group d-none"></ul>
                        </div>

                        <!-- Bottom menu -->
                        <div id="gis-bottom-menu" class="gis-bottom-menu d-flex align-items-center">

                            <!-- Mobile toggle -->
                            <button id="toggleMenuBtn" class="d-block d-sm-none bottom-menu-toggle" title="Show tools">
                                ☰
                            </button>

                            <div id="menuButtons" class="d-flex align-items-center gap-2">

                                <!-- Navigation -->
                                <div class="bottom-menu-group dropup">
                                    <button class="bottom-menu-button dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-display="static">
                                        <i class="fa-solid fa-compass"></i>
                                        <span class="menu-label">Navigate</span>
                                    </button>

                                    <ul class="dropdown-menu bottom-menu-dropdown">
                                        <li>
                                            <button class="dropdown-item" id="gps">
                                                <i class="fas fa-location-crosshairs"></i> Location
                                            </button>
                                        </li>
                                        <li>
                                            <button class="dropdown-item" id="home">
                                                <i class="fas fa-crosshairs"></i> Center map
                                            </button>
                                        </li>
                                        <li>
                                            <button class="dropdown-item" id="rotate">
                                                <i class="fa-solid fa-compass"></i> Reset rotation
                                            </button>
                                        </li>
                                        <li>
                                            <button class="dropdown-item" id="rotate90">
                                                <i class="fas fa-rotate-left"></i> Rotate left
                                            </button>
                                        </li>
                                    </ul>
                                </div>

                                <!-- Analysis -->
                                <div class="bottom-menu-group dropup hideResponsive">
                                    <button class="bottom-menu-button dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-display="static">
                                        <i class="fa-solid fa-ruler-combined"></i>
                                        <span class="menu-label">Analysis</span>
                                    </button>

                                    <ul class="dropdown-menu bottom-menu-dropdown">
                                        <li>
                                            <button class="dropdown-item" id="btnMeasureLength">
                                                <i class="fas fa-ruler"></i> Distance
                                            </button>
                                        </li>
                                        <li>
                                            <button class="dropdown-item" id="btnMeasureArea">
                                                <i class="fas fa-draw-polygon"></i> Area
                                            </button>
                                        </li>
                                        <li>
                                            <button class="dropdown-item" id="btnProfile">
                                                <i class="fas fa-mountain"></i> Elevation profile
                                            </button>
                                        </li>
                                        <li>
                                            <button class="dropdown-item" id="btnSpatialViewport">
                                                <i class="fas fa-info-circle"></i> Bounding box
                                            </button>
                                        </li>

                                        <li id="openBusinessScreenLi">
                                            <button id="openBusinessScreenBtn" class="dropdown-item">
                                                <i class="fa-solid fa-table"></i>
                                                Table
                                            </button>
                                        </li>
                                        
                                        <li>
                                            <button class="dropdown-item" id="btnSpatialDraw">
                                                <i class="fas fa-draw-polygon"></i> Spatial search
                                            </button>
                                        </li>
                                        <li><hr class="dropdown-divider"></li>
                                        <li>
                                            <button class="dropdown-item text-danger d-none" id="btnCancelMeasure">
                                                <i class="fas fa-times"></i> Cancel measure
                                            </button>
                                        </li>
                                        <li>
                                            <button class="dropdown-item text-danger" id="btnSpatialDrawCancel">
                                                <i class="fas fa-times"></i> Clear spatial search
                                            </button>
                                        </li>
                                    </ul>
                                </div>

                                <!-- Extra -->
                                <div class="bottom-menu-group dropup hideResponsive">
                                    <button class="bottom-menu-button dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-display="static">
                                        <i class="fa-solid fa-layer-group"></i>
                                        <span class="menu-label">Extra</span>
                                    </button>

                                    <ul class="dropdown-menu bottom-menu-dropdown">
                                        <li>
                                            <button class="dropdown-item" id="btnAddFileLayer">
                                                <i class="fas fa-upload"></i> Upload layer
                                            </button>
                                        </li>
                                        <li>
                                            <button class="dropdown-item" id="btnStreetView">
                                                <i class="fa-solid fa-street-view"></i> Street View
                                            </button>
                                        </li>
                                    </ul>
                                </div>

                                <!-- Export -->
                                <div class="bottom-menu-group dropup">
                                    <button class="bottom-menu-button dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-display="static">
                                        <i class="fa-solid fa-file-export"></i>
                                        <span class="menu-label">Export</span>
                                    </button>

                                    <ul class="dropdown-menu bottom-menu-dropdown">
                                        <li>
                                            <button class="dropdown-item" id="btnPrintPdfMapfish">
                                                <i class="fa-solid fa-file-pdf"></i> PDF
                                            </button>
                                        </li>
                                        <li>
                                            <button class="dropdown-item" id="clientPdfBtn">
                                                <i class="fa-solid fa-file-pdf"></i> PDF client
                                            </button>
                                        </li>
                                    </ul>
                                </div>

                                <!-- Clean direct action -->
                                <button id="clearAllLayers" title="Clean map" class="bottom-menu-button">
                                    <i class="fa-solid fa-broom"></i>
                                    <span class="menu-label">Clean</span>
                                </button>

                            </div>
                        </div>

                        <!-- <button id="openBusinessScreenBtn" class="screen-toggle-btn">
                            <i class="fa-solid fa-building"></i>
                            <span>Business</span>
                        </button> -->

                        <!-- Rigth button to show panel -->
                        <div id="mapFloatingControls">
                            <button id="toggleResultsPanelBtn" class="map-btn">
                                <i id="togglePanelIcon" class="fa-solid fa-table-columns"></i>
                                <span class="ms-1 d-none d-md-inline">Results</span>
                            </button>
                        </div>

                        <!-- Right identify panel -->
                        <div id="gfiRightPanel" class="gfi-panel">

                            <div id="gfiPanelHeader" class="gfi-panel__header">
                                <div class="gfi-panel__title">
                                    Identify results
                                    <button id="gfiExportZipBtn" class="gfi-btn" title="Export results as ZIP">
                                        <i class="fa-solid fa-file-zipper fa-xl"></i>
                                    </button>
                                </div>
                                
                                <button id="gfiPanelClose" title="Close">✖</button>
                            </div>

                            <div id="gfiLoading" class="gfi-loading d-none">
                                <i class="fa fa-spinner fa-spin me-2"></i>
                                <span>Loading…</span>
                            </div>

                            <div id="gfiPanelBody" class="gfi-panel__body">
                                <div class="text-muted small">
                                    Click on the map to identify features.
                                </div>
                            </div>

                        </div>

                        <!-- Modal aquí-->


                        <div id="map-compass" class="ol-compass">
                            <button type="button" class="ol-compass-btn" title="Rotate / Reset north">
                                <svg viewBox="0 0 240 240" class="ol-compass-svg" aria-hidden="true">
                                <!-- Ring -->
                                <circle cx="120" cy="120" r="90" fill="#fff" stroke="#222" stroke-width="6"/>
                                <circle cx="120" cy="120" r="74" fill="none" stroke="#bbb" stroke-width="2"/>

                                <!-- Labels OUTSIDE the circle -->
                                <text x="120" y="24"  text-anchor="middle" class="compass-label compass-n">N</text>
                                <text x="120" y="232" text-anchor="middle" class="compass-label compass-s">S</text>
                                <text x="-1"  y="128" text-anchor="start"  class="compass-label compass-w">W</text>
                                <text x="230" y="128" text-anchor="end"    class="compass-label compass-e">E</text>

                                <!-- Needle (rotates) -->
                                <g class="compass-needle">
                                    <polygon points="120,34 138,120 120,100 102,120" fill="#d62828"/>
                                    <polygon points="120,206 138,120 120,140 102,120" fill="#333"/>
                                    <circle cx="120" cy="120" r="7" fill="#111"/>
                                    <circle cx="120" cy="120" r="3.5" fill="#fff"/>
                                </g>
                                </svg>
                            </button>
                        </div>

                    </div>
            </section>

            <!-- BUSINESS SCREEN -->
            <section id="businessScreen" class="app-screen business-screen">

                <div class="business-header">
                    <div>
                        <h5 class="mb-0">Map data in table</h5>
                        
                    </div>

                    <div class="d-flex gap-2">
                        <!-- <button id="refreshTableViewBtn" class="btn btn-sm btn-outline-primary">
                            <i class="fa-solid fa-rotate"></i>
                            Refresh
                        </button> -->

                        <button id="backToGisBtn" class="btn btn-sm btn-outline-secondary">
                            <i class="fa-solid fa-arrow-left"></i>
                            Back to map
                        </button>
                    </div>
                </div>

                <div class="business-content">
                    <div class="gis-table-toolbar d-flex align-items-center gap-2 mb-2 col-3 px-0">
                         <div class="gis-search-wrapper">
                            <i class="fa-solid fa-magnifying-glass gis-search-icon"></i>
                            <input type="search" id="gisTableSearchInput"  class="form-control form-control-sm" placeholder="Search..." autocomplete="off">
                        </div>
                    </div>
                        
                    <div id="gisResultsTabsWrapper" class="gis-results-tabs-wrapper">                        
                        <ul id="gisResultsTabs" class="nav nav-tabs"></ul>
                        <div id="gisResultsTabContent" class="tab-content gis-results-tab-content"></div>
                    </div>

                    <div id="tableMapResizeHandle" class="table-map-resize-handle"></div>
                    
                    <div id="tableMiniMap" class="table-mini-map">
                        
                    </div>
                </div>

            </section>

        </div>







   

    
    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
